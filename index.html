<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velvet — Music Streaming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-0: #080808;
      --bg-1: #111111;
      --bg-2: #1c1c1c;
      --accent: #C8102E;
      --text: #f5f0f0;
      --muted: #c8bec0;
      --line: #2b2b2b;
      --radius: 14px;
      --ease: 220ms ease;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at 85% -10%, rgba(200,16,46,0.16), transparent 32%), var(--bg-0);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 112px;
    }

    .app {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: linear-gradient(180deg, #101010, #090909 85%);
      border-right: 1px solid var(--line);
      padding: 24px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: .2rem;
      font-size: 2rem;
      margin: 0 0 24px;
      color: #fff;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 11px 12px;
      border-radius: 10px;
      margin-bottom: 6px;
      cursor: pointer;
      font-weight: 500;
      text-align: left;
      transition: all var(--ease);
    }

    .nav-btn.active,
    .nav-btn:hover {
      background: #171717;
      color: #fff;
    }

    .main { padding: 24px; }
    .page { display: none; }
    .page.active { display: block; }

    .hero {
      background: linear-gradient(135deg, rgba(200,16,46,.6), rgba(30,30,30,.85));
      border: 1px solid #421019;
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }

    h1, h2, h3, .title-font { font-family: 'Cormorant Garamond', serif; font-weight: 600; }
    .hero h1 { margin: 0 0 10px; font-size: 2.4rem; }
    .hero p { margin: 0; color: #f0d9dd; max-width: 700px; }

    .section-title {
      margin: 24px 0 14px;
      font-size: 1.5rem;
    }

    .card-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .song-card,
    .artist-card,
    .playlist-card {
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: transform var(--ease), border-color var(--ease), background var(--ease);
    }

    .song-card:hover,
    .artist-card:hover,
    .playlist-card:hover {
      transform: translateY(-2px);
      border-color: #5a1b26;
      background: #181818;
    }

    .song-art,
    .artist-art {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 10px;
      object-fit: cover;
      margin-bottom: 10px;
      background: #252525;
    }

    .meta-artist {
      font-size: .85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .meta-artist button {
      border: 0;
      padding: 0;
      background: transparent;
      color: #f0bac4;
      cursor: pointer;
      text-decoration: underline;
      font: inherit;
      font-size: .85rem;
    }

    .song-list { background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
    .song-row {
      display: grid;
      grid-template-columns: 56px 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }
    .song-row:last-child { border-bottom: 0; }
    .song-row:hover { background: #181818; }
    .song-row img { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; }

    .icon-btn {
      border: 1px solid #3b3b3b;
      background: transparent;
      color: var(--text);
      border-radius: 999px;
      width: 30px;
      height: 30px;
      cursor: pointer;
    }

    .search-wrap { display: grid; gap: 14px; }
    .search-input {
      width: 100%;
      background: #141414;
      border: 1px solid #2e2e2e;
      border-radius: 999px;
      color: #fff;
      padding: 12px 16px;
      font-size: 1rem;
    }

    .artist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }

    .queue-list .song-row { grid-template-columns: 34px 56px 1fr auto; }
    .drag-handle { color: #8b8b8b; font-size: 1.1rem; text-align: center; }

    .playlist-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .playlist-controls input {
      background: #141414;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      color: #fff;
      padding: 10px;
      min-width: 220px;
    }
    .btn {
      background: var(--accent);
      border: 0;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .now-playing {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0e0e0e;
      border-top: 1px solid #252525;
      display: none;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      padding: 10px 14px;
      align-items: center;
      z-index: 20;
    }
    .now-playing.show { display: grid; }

    .np-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .np-left img { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; cursor: pointer; }
    .np-meta { min-width: 0; }
    .np-meta .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np-meta .artist { font-size: .85rem; color: var(--muted); }

    .np-center { display: grid; justify-items: center; gap: 8px; min-width: 360px; }
    .controls { display: flex; gap: 8px; align-items: center; }
    .progress-wrap { width: min(520px, 65vw); display: grid; grid-template-columns: 40px 1fr 40px; gap: 8px; align-items: center; }
    .progress { width: 100%; }

    .np-right { display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
    .np-right input[type="range"] { width: 110px; }

    .visualizer {
      display: flex;
      gap: 3px;
      align-items: end;
      height: 18px;
      width: 26px;
    }
    .bar {
      width: 4px;
      background: var(--accent);
      border-radius: 999px;
      height: 3px;
      opacity: .5;
    }
    .visualizer.playing .bar:nth-child(1) { animation: eq 500ms ease-in-out infinite; }
    .visualizer.playing .bar:nth-child(2) { animation: eq 420ms ease-in-out infinite 110ms; }
    .visualizer.playing .bar:nth-child(3) { animation: eq 570ms ease-in-out infinite 70ms; }
    @keyframes eq { 0%,100%{height:3px;opacity:.4;} 50%{height:16px;opacity:1;} }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.86);
      display: none;
      z-index: 30;
      place-items: center;
      padding: 20px;
    }
    .overlay.show { display: grid; }
    .player-modal {
      width: min(940px, 100%);
      background: #121212;
      border: 1px solid #2c2c2c;
      border-radius: 18px;
      padding: 22px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }
    .player-modal img { width: 100%; border-radius: 14px; }

    .hidden-player { position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      .now-playing { grid-template-columns: 1fr; }
      .np-center { min-width: 0; }
      .np-right { justify-content: flex-start; }
      .player-modal { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h2 class="logo">Velvet</h2>
      <button class="nav-btn active" data-page="home">Home</button>
      <button class="nav-btn" data-page="search">Search</button>
      <button class="nav-btn" data-page="library">Library</button>
      <button class="nav-btn" data-page="liked">Liked Songs</button>
      <button class="nav-btn" data-page="playlists">Playlists</button>
      <button class="nav-btn" data-page="queue">Queue</button>
    </aside>

    <main class="main">
      <section id="home" class="page active">
        <div class="hero">
          <h1>Midnight Velvet Sessions</h1>
          <p>Luxury dark listening. Album art forward. Designed for uninterrupted deep focus and late-night replay loops.</p>
        </div>

        <h3 class="section-title">Recently Played</h3>
        <div id="recentRow" class="card-row"></div>

        <h3 class="section-title">Trending Now</h3>
        <div id="trendingRow" class="card-row"></div>

        <h3 class="section-title">Top Picks</h3>
        <div id="topPicks" class="song-list"></div>
      </section>

      <section id="search" class="page">
        <h2 class="section-title">Search</h2>
        <div class="search-wrap">
          <input id="searchInput" class="search-input" placeholder="Search songs, artists..." />
          <div>
            <h3 class="section-title">Artists</h3>
            <div id="artistResults" class="artist-grid"></div>
          </div>
          <div>
            <h3 class="section-title">Songs</h3>
            <div id="songResults" class="song-list"></div>
          </div>
        </div>
      </section>

      <section id="library" class="page">
        <h2 class="section-title">Library</h2>
        <div class="playlist-controls">
          <input id="localFileInputLabel" value="Import local MP3/WAV files into Velvet" readonly />
          <button id="importLocalBtn" class="btn">Import Files</button>
          <input id="localFileInput" type="file" accept="audio/*" multiple style="display:none" />
        </div>
        <div id="libraryList" class="song-list"></div>
      </section>

      <section id="liked" class="page">
        <h2 class="section-title">Liked Songs</h2>
        <div id="likedList" class="song-list"></div>
      </section>

      <section id="playlists" class="page">
        <h2 class="section-title">Playlists</h2>
        <div class="playlist-controls">
          <input id="playlistNameInput" placeholder="Playlist name" />
          <button id="createPlaylistBtn" class="btn">Create Playlist</button>
        </div>
        <div id="playlistGrid" class="card-row"></div>
        <h3 class="section-title">Selected Playlist Songs</h3>
        <div id="playlistSongs" class="song-list"></div>
      </section>

      <section id="queue" class="page">
        <h2 class="section-title">Queue</h2>
        <div id="queueList" class="song-list queue-list"></div>
      </section>
    </main>
  </div>

  <div id="expandedPlayer" class="overlay">
    <div class="player-modal">
      <img id="expandedArt" src="" alt="album art" />
      <div>
        <h2 id="expandedTitle" class="title-font"></h2>
        <p id="expandedArtist" style="color:var(--muted)"></p>
        <div id="expandedMeta" style="margin-top:12px; color:#dbbfc5;"></div>
      </div>
    </div>
  </div>

  <div id="nowPlaying" class="now-playing">
    <div class="np-left">
      <img id="npArt" src="" alt="current art" />
      <div class="np-meta">
        <div id="npTitle" class="name">—</div>
        <div id="npArtist" class="artist">—</div>
      </div>
    </div>

    <div class="np-center">
      <div class="controls">
        <button id="shuffleBtn" class="icon-btn">⤮</button>
        <button id="prevBtn" class="icon-btn">⏮</button>
        <button id="playBtn" class="icon-btn">▶</button>
        <button id="nextBtn" class="icon-btn">⏭</button>
        <button id="repeatBtn" class="icon-btn">↺</button>
      </div>
      <div class="progress-wrap">
        <span id="curTime" style="font-size:.75rem;color:#b9b9b9">0:00</span>
        <input id="progress" class="progress" type="range" min="0" max="100" value="0" />
        <span id="durTime" style="font-size:.75rem;color:#b9b9b9">0:00</span>
      </div>
    </div>

    <div class="np-right">
      <button id="likeBtn" class="icon-btn">♡</button>
      <div id="visualizer" class="visualizer" aria-label="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <label style="font-size:.8rem;color:#b9b9b9">Vol</label>
      <input id="volume" type="range" min="0" max="100" value="70" />
    </div>
  </div>

  <audio id="localAudio" class="hidden-player"></audio>
  <div id="youtubePlayer" class="hidden-player"></div>

  <script>
    const YT_API_KEY = 'AIzaSyCOPIlhlMif2rurvQB4qLkM4you1pVVQ-4';
    const STORAGE = {
      liked: 'velvet_liked',
      playlists: 'velvet_playlists',
      recents: 'velvet_recent'
    };

    const seedSongs = [
      { id:'s1', title:'Nights', artist:'Frank Ocean', videoId:'r4l9bFqgMaQ', art:'https://i.ytimg.com/vi/r4l9bFqgMaQ/hqdefault.jpg' },
      { id:'s2', title:'After Dark', artist:'Mr.Kitty', videoId:'waAlgFq9Xq8', art:'https://i.ytimg.com/vi/waAlgFq9Xq8/hqdefault.jpg' },
      { id:'s3', title:'Earned It', artist:'The Weeknd', videoId:'waU75jdUnYw', art:'https://i.ytimg.com/vi/waU75jdUnYw/hqdefault.jpg' },
      { id:'s4', title:'Angel', artist:'Massive Attack', videoId:'66A_3uwuZ_I', art:'https://i.ytimg.com/vi/66A_3uwuZ_I/hqdefault.jpg' },
      { id:'s5', title:'Redbone', artist:'Childish Gambino', videoId:'Kp7eSUU9oy8', art:'https://i.ytimg.com/vi/Kp7eSUU9oy8/hqdefault.jpg' },
      { id:'s6', title:'West Coast', artist:'Lana Del Rey', videoId:'oKxuiw3iMBE', art:'https://i.ytimg.com/vi/oKxuiw3iMBE/hqdefault.jpg' }
    ];

    const state = {
      songs: [...seedSongs],
      current: null,
      queue: [...seedSongs],
      queueIndex: 0,
      isPlaying: false,
      likes: new Set(JSON.parse(localStorage.getItem(STORAGE.liked) || '[]')),
      playlists: JSON.parse(localStorage.getItem(STORAGE.playlists) || '{}'),
      selectedPlaylist: null,
      recent: JSON.parse(localStorage.getItem(STORAGE.recents) || '[]'),
      shuffle: false,
      repeat: false,
      playerReady: false,
      sourceType: 'youtube'
    };

    const $ = sel => document.querySelector(sel);
    const $$ = sel => Array.from(document.querySelectorAll(sel));

    let ytPlayer;
    let ytReadyResolve;
    const ytReadyPromise = new Promise(r => ytReadyResolve = r);

    function loadYouTubeAPI() {
      if (window.YT && window.YT.Player) {
        onYouTubeIframeAPIReady();
        return;
      }
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }

    window.onYouTubeIframeAPIReady = function () {
      ytPlayer = new YT.Player('youtubePlayer', {
        height: '0', width: '0',
        playerVars: { autoplay: 0, controls: 0, modestbranding: 1, rel: 0 },
        events: {
          onReady: () => {
            state.playerReady = true;
            ytReadyResolve();
          },
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.ENDED) handleNext();
            const playing = e.data === YT.PlayerState.PLAYING;
            state.isPlaying = playing;
            $('#visualizer').classList.toggle('playing', playing);
            $('#playBtn').textContent = playing ? '⏸' : '▶';
          }
        }
      });
    };

    function fmt(sec) {
      sec = Math.max(0, Math.floor(sec || 0));
      return `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, '0')}`;
    }

    function saveState() {
      localStorage.setItem(STORAGE.liked, JSON.stringify([...state.likes]));
      localStorage.setItem(STORAGE.playlists, JSON.stringify(state.playlists));
      localStorage.setItem(STORAGE.recents, JSON.stringify(state.recent.slice(0, 16)));
    }

    function markNowPlaying(song) {
      if (!song) return;
      $('#nowPlaying').classList.add('show');
      $('#npArt').src = song.art;
      $('#npTitle').textContent = song.title;
      $('#npArtist').textContent = song.artist;
      $('#expandedArt').src = song.art;
      $('#expandedTitle').textContent = song.title;
      $('#expandedArtist').textContent = song.artist;
      $('#expandedMeta').textContent = song.localFile ? 'Local file playback' : `YouTube source • ${song.videoId || 'search result'}`;
      $('#likeBtn').textContent = state.likes.has(song.id) ? '♥' : '♡';
    }

    async function playSong(song, fromQueue = false) {
      state.current = song;
      if (!fromQueue) {
        state.queue = [song, ...state.songs.filter(s => s.id !== song.id)];
        state.queueIndex = 0;
        renderQueue();
      }
      markNowPlaying(song);

      const localAudio = $('#localAudio');
      if (song.localFile) {
        state.sourceType = 'local';
        try { if (state.playerReady && ytPlayer?.stopVideo) ytPlayer.stopVideo(); } catch {}
        localAudio.src = song.localFile;
        await localAudio.play();
        state.isPlaying = true;
        $('#playBtn').textContent = '⏸';
        $('#visualizer').classList.add('playing');
      } else {
        state.sourceType = 'youtube';
        localAudio.pause();
        await ytReadyPromise;
        ytPlayer.loadVideoById(song.videoId);
        ytPlayer.playVideo();
        state.isPlaying = true;
      }

      state.recent = [song.id, ...state.recent.filter(id => id !== song.id)].slice(0, 16);
      saveState();
      renderHomeRows();
    }

    function togglePlay() {
      if (!state.current) return;
      const localAudio = $('#localAudio');
      if (state.sourceType === 'local') {
        if (localAudio.paused) { localAudio.play(); state.isPlaying = true; }
        else { localAudio.pause(); state.isPlaying = false; }
      } else {
        if (!state.playerReady) return;
        if (state.isPlaying) { ytPlayer.pauseVideo(); state.isPlaying = false; }
        else { ytPlayer.playVideo(); state.isPlaying = true; }
      }
      $('#playBtn').textContent = state.isPlaying ? '⏸' : '▶';
      $('#visualizer').classList.toggle('playing', state.isPlaying);
    }

    function handleNext() {
      if (!state.queue.length) return;
      if (state.shuffle) {
        state.queueIndex = Math.floor(Math.random() * state.queue.length);
      } else if (state.queueIndex < state.queue.length - 1) {
        state.queueIndex += 1;
      } else if (state.repeat) {
        state.queueIndex = 0;
      } else {
        state.isPlaying = false;
        return;
      }
      playSong(state.queue[state.queueIndex], true);
    }

    function handlePrev() {
      if (!state.queue.length) return;
      state.queueIndex = Math.max(0, state.queueIndex - 1);
      playSong(state.queue[state.queueIndex], true);
    }

    function rowTemplate(song, withPlaylistActions = false) {
      return `<div class="song-row" data-song-id="${song.id}" draggable="true">
        <img src="${song.art}" alt="${song.title}">
        <div>
          <div>${song.title}</div>
          <div class="meta-artist"><button class="artist-link" data-artist="${song.artist}">${song.artist}</button></div>
        </div>
        ${withPlaylistActions ? `<button class="icon-btn add-playlist" data-song-id="${song.id}">＋</button>` : ''}
        <button class="icon-btn like-song" data-song-id="${song.id}">${state.likes.has(song.id) ? '♥' : '♡'}</button>
      </div>`;
    }

    function cardTemplate(song) {
      return `<article class="song-card" data-song-id="${song.id}">
        <img class="song-art" src="${song.art}" alt="${song.title}" />
        <div>${song.title}</div>
        <div class="meta-artist"><button class="artist-link" data-artist="${song.artist}">${song.artist}</button></div>
      </article>`;
    }

    function renderHomeRows() {
      const byId = id => state.songs.find(s => s.id === id);
      const recentSongs = state.recent.map(byId).filter(Boolean);
      $('#recentRow').innerHTML = (recentSongs.length ? recentSongs : seedSongs.slice(0, 4)).map(cardTemplate).join('');
      $('#trendingRow').innerHTML = state.songs.slice(0, 6).map(cardTemplate).join('');
      $('#topPicks').innerHTML = state.songs.slice(0, 10).map(s => rowTemplate(s, true)).join('');
      $('#libraryList').innerHTML = state.songs.map(s => rowTemplate(s, true)).join('');
      renderLiked();
      renderPlaylistGrid();
      renderQueue();
    }

    function renderLiked() {
      const liked = state.songs.filter(s => state.likes.has(s.id));
      $('#likedList').innerHTML = liked.length ? liked.map(rowTemplate).join('') : '<div style="padding:16px;color:#aaa">No liked songs yet.</div>';
    }

    function renderPlaylistGrid() {
      const entries = Object.entries(state.playlists);
      $('#playlistGrid').innerHTML = entries.length ? entries.map(([name, ids]) => `<article class="playlist-card" data-playlist="${name}">
        <div class="title-font" style="font-size:1.2rem">${name}</div><div style="color:#bcaeb1;margin-top:6px">${ids.length} songs</div>
      </article>`).join('') : '<div style="color:#aaa">No playlists created.</div>';

      if (state.selectedPlaylist && state.playlists[state.selectedPlaylist]) {
        const songs = state.playlists[state.selectedPlaylist].map(id => state.songs.find(s => s.id === id)).filter(Boolean);
        $('#playlistSongs').innerHTML = songs.length ? songs.map(rowTemplate).join('') : '<div style="padding:16px;color:#aaa">Playlist is empty.</div>';
      } else {
        $('#playlistSongs').innerHTML = '<div style="padding:16px;color:#aaa">Select a playlist and add songs from Home/Library using ＋.</div>';
      }
    }

    function renderQueue() {
      $('#queueList').innerHTML = state.queue.map((song, idx) => `<div class="song-row" data-queue-index="${idx}" draggable="true">
        <div class="drag-handle">☰</div>
        <img src="${song.art}" alt="${song.title}">
        <div><div>${idx === state.queueIndex ? '▶ ' : ''}${song.title}</div><div class="meta-artist">${song.artist}</div></div>
        <button class="icon-btn queue-play" data-queue-index="${idx}">Play</button>
      </div>`).join('');
    }

    async function searchYouTube(query) {
      if (!query.trim()) {
        $('#artistResults').innerHTML = '';
        $('#songResults').innerHTML = '';
        return;
      }
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=12&q=${encodeURIComponent(query + ' song')}&key=${YT_API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();
      const items = (data.items || []).map((item, i) => ({
        id: `yt_${item.id.videoId}_${Date.now()}_${i}`,
        title: item.snippet.title,
        artist: item.snippet.channelTitle,
        videoId: item.id.videoId,
        art: item.snippet.thumbnails?.high?.url || item.snippet.thumbnails?.default?.url || ''
      }));

      items.forEach(s => { if (!state.songs.some(existing => existing.videoId === s.videoId)) state.songs.push(s); });

      const uniqArtists = [...new Map(items.map(s => [s.artist, s])).values()].slice(0, 5);
      $('#artistResults').innerHTML = uniqArtists.map(a => `<article class="artist-card" data-artist="${a.artist}">
          <img class="artist-art" src="${a.art}" alt="${a.artist}" /><div>${a.artist}</div>
        </article>`).join('');
      $('#songResults').innerHTML = items.map(rowTemplate).join('');
      renderHomeRows();
    }

    async function showArtistPage(artist) {
      $$('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === 'search'));
      $$('.page').forEach(p => p.classList.remove('active'));
      $('#search').classList.add('active');
      $('#searchInput').value = artist;
      await searchYouTube(artist);
      const rows = state.songs.filter(s => s.artist.toLowerCase().includes(artist.toLowerCase())).map(rowTemplate).join('');
      $('#songResults').innerHTML = rows || '<div style="padding:16px;color:#aaa">No songs found for this artist yet.</div>';
    }

    function attachGlobalEvents() {
      document.body.addEventListener('click', (e) => {
        const nav = e.target.closest('.nav-btn');
        if (nav) {
          $$('.nav-btn').forEach(b => b.classList.toggle('active', b === nav));
          $$('.page').forEach(p => p.classList.remove('active'));
          $('#' + nav.dataset.page).classList.add('active');
          return;
        }

        const card = e.target.closest('[data-song-id]');
        if (card && !e.target.classList.contains('like-song') && !e.target.classList.contains('add-playlist') && !e.target.classList.contains('artist-link')) {
          const song = state.songs.find(s => s.id === card.dataset.songId);
          if (song) playSong(song);
          return;
        }

        const artistLink = e.target.closest('.artist-link, .artist-card');
        if (artistLink) {
          const artist = artistLink.dataset.artist;
          if (artist) showArtistPage(artist);
          return;
        }

        const like = e.target.closest('.like-song, #likeBtn');
        if (like && state.current) {
          const id = like.dataset.songId || state.current.id;
          if (state.likes.has(id)) state.likes.delete(id); else state.likes.add(id);
          saveState();
          renderLiked(); renderHomeRows();
          $('#likeBtn').textContent = state.likes.has(state.current.id) ? '♥' : '♡';
          return;
        }

        const add = e.target.closest('.add-playlist');
        if (add) {
          if (!state.selectedPlaylist) return alert('Select a playlist card first.');
          const list = state.playlists[state.selectedPlaylist] || [];
          if (!list.includes(add.dataset.songId)) list.push(add.dataset.songId);
          state.playlists[state.selectedPlaylist] = list;
          saveState(); renderPlaylistGrid();
          return;
        }

        const playlist = e.target.closest('.playlist-card');
        if (playlist) {
          state.selectedPlaylist = playlist.dataset.playlist;
          renderPlaylistGrid();
          return;
        }

        const queuePlay = e.target.closest('.queue-play');
        if (queuePlay) {
          state.queueIndex = Number(queuePlay.dataset.queueIndex);
          playSong(state.queue[state.queueIndex], true);
          return;
        }
      });

      $('#createPlaylistBtn').addEventListener('click', () => {
        const name = $('#playlistNameInput').value.trim();
        if (!name) return;
        if (!state.playlists[name]) state.playlists[name] = [];
        state.selectedPlaylist = name;
        $('#playlistNameInput').value = '';
        saveState(); renderPlaylistGrid();
      });

      $('#searchInput').addEventListener('input', debounce(e => searchYouTube(e.target.value), 450));
      $('#importLocalBtn').addEventListener('click', () => $('#localFileInput').click());
      $('#localFileInput').addEventListener('change', (e) => {
        const files = Array.from(e.target.files || []);
        const imported = files.map((file, i) => {
          const src = URL.createObjectURL(file);
          return {
            id: `local_${Date.now()}_${i}`,
            title: file.name.replace(/\.[^/.]+$/, ''),
            artist: 'Local File',
            art: 'https://images.unsplash.com/photo-1458560871784-56d23406c091?auto=format&fit=crop&w=900&q=60',
            localFile: src
          };
        });
        state.songs = [...imported, ...state.songs];
        state.queue = [...state.songs];
        renderHomeRows();
      });
      $('#playBtn').addEventListener('click', togglePlay);
      $('#nextBtn').addEventListener('click', handleNext);
      $('#prevBtn').addEventListener('click', handlePrev);
      $('#shuffleBtn').addEventListener('click', () => { state.shuffle = !state.shuffle; $('#shuffleBtn').style.color = state.shuffle ? '#C8102E' : '#fff'; });
      $('#repeatBtn').addEventListener('click', () => { state.repeat = !state.repeat; $('#repeatBtn').style.color = state.repeat ? '#C8102E' : '#fff'; });

      $('#npArt').addEventListener('click', () => $('#expandedPlayer').classList.add('show'));
      $('#expandedPlayer').addEventListener('click', (e) => { if (e.target.id === 'expandedPlayer') e.currentTarget.classList.remove('show'); });

      $('#volume').addEventListener('input', (e) => {
        const v = Number(e.target.value) / 100;
        $('#localAudio').volume = v;
        if (state.playerReady) ytPlayer.setVolume(Number(e.target.value));
      });

      document.addEventListener('keydown', (e) => {
        if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        if (e.code === 'ArrowRight') handleNext();
        if (e.code === 'ArrowLeft') handlePrev();
      });

      const localAudio = $('#localAudio');
      localAudio.addEventListener('timeupdate', () => {
        if (state.sourceType !== 'local') return;
        const cur = localAudio.currentTime || 0;
        const dur = localAudio.duration || 0;
        $('#curTime').textContent = fmt(cur);
        $('#durTime').textContent = fmt(dur);
        $('#progress').value = dur ? (cur / dur) * 100 : 0;
      });
      localAudio.addEventListener('ended', handleNext);

      $('#progress').addEventListener('input', (e) => {
        const value = Number(e.target.value) / 100;
        if (state.sourceType === 'local') {
          const dur = $('#localAudio').duration || 0;
          $('#localAudio').currentTime = dur * value;
        } else if (state.playerReady && ytPlayer.getDuration) {
          const dur = ytPlayer.getDuration() || 0;
          ytPlayer.seekTo(dur * value, true);
        }
      });

      enableQueueDragDrop();
    }

    function enableQueueDragDrop() {
      let dragFrom = null;
      $('#queueList').addEventListener('dragstart', (e) => {
        const row = e.target.closest('[data-queue-index]');
        if (!row) return;
        dragFrom = Number(row.dataset.queueIndex);
      });
      $('#queueList').addEventListener('dragover', e => e.preventDefault());
      $('#queueList').addEventListener('drop', (e) => {
        const target = e.target.closest('[data-queue-index]');
        if (!target || dragFrom === null) return;
        const to = Number(target.dataset.queueIndex);
        if (to === dragFrom) return;
        const [moved] = state.queue.splice(dragFrom, 1);
        state.queue.splice(to, 0, moved);
        if (state.queueIndex === dragFrom) state.queueIndex = to;
        renderQueue();
        dragFrom = null;
      });
    }

    function debounce(fn, ms = 300) {
      let t;
      return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    }

    function pollYouTubeProgress() {
      setInterval(() => {
        if (state.sourceType !== 'youtube' || !state.playerReady || !state.current || !ytPlayer.getCurrentTime) return;
        const cur = ytPlayer.getCurrentTime() || 0;
        const dur = ytPlayer.getDuration() || 0;
        $('#curTime').textContent = fmt(cur);
        $('#durTime').textContent = fmt(dur);
        $('#progress').value = dur ? (cur / dur) * 100 : 0;
      }, 500);
    }

    function init() {
      loadYouTubeAPI();
      renderHomeRows();
      attachGlobalEvents();
      pollYouTubeProgress();
    }

    init();
  </script>
</body>
</html>
